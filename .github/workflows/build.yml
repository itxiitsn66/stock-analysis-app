name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9.18'

      - name: Install system dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y -qq \
            python3-pip \
            ffmpeg \
            libffmpeg-dev \
            libsmpeg-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libgl1-mesa-dev \
            libsqlite3-dev \
            git \
            zip \
            unzip \
            openjdk-11-jdk

      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install kivy==2.2.0 requests buildozer

      - name: Build debug APK
        run: |
          buildozer android debug
        timeout-minutes: 80

      - name: List output files
        run: |
          ls -lh bin/ 2>/dev/null || echo "No bin folder"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stockanalysis-apk
          path: |
            bin/*.apk
          retention-days: 7
