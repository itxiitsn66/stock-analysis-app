name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Print Python version
        run: |
          python --version
          pip --version

      - name: Install system dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y -qq \
            python3-pip \
            ffmpeg \
            libffmpeg-dev \
            libsmpeg-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libsqlite3-dev \
            git \
            zip \
            unzip \
            openjdk-17-jdk

      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install kivy buildozer requests

      - name: Print buildozer version
        run: |
          buildozer --version

      - name: Prepare buildozer.spec
        run: |
          ls -la
          cat buildozer.spec

      - name: Build debug APK
        run: |
          buildozer android debug || true
        timeout-minutes: 80

      - name: Debug - List all files
        if: always()
        run: |
          echo "=== Current directory ==="
          ls -la
          echo "=== Bin directory ==="
          ls -la bin/ 2>/dev/null || echo "No bin directory"
          echo "=== .buildozer directory ==="
          ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"
          echo "=== Home directory ==="
          ls -la ~/ 2>/dev/null | head -20

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stockanalysis-apk
          path: |
            bin/*.apk
            .buildozer/**/*.apk
          retention-days: 7
